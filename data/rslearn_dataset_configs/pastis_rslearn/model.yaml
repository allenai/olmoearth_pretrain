# Canonical model/task config for the pastis_rslearn eval dataset (see
# olmoearth_pretrain/evals/datasets/pastis_rslearn_export.py). Consumed by
# studio_ingest and the eval-time dataset builder
# (olmoearth_pretrain/evals/datasets/rslearn_builder.py); only the `data`
# block is read. Band orders match the OlmoEarth modality band_order so the
# eval-time normalizer sees channels in the expected order.
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/olmoearth/eval_datasets/pastis_rslearn
    inputs:
      sentinel2_l2a:
        data_type: raster
        dtype: FLOAT32
        layers:
          - sentinel2_l2a_mo01
          - sentinel2_l2a_mo02
          - sentinel2_l2a_mo03
          - sentinel2_l2a_mo04
          - sentinel2_l2a_mo05
          - sentinel2_l2a_mo06
          - sentinel2_l2a_mo07
          - sentinel2_l2a_mo08
          - sentinel2_l2a_mo09
          - sentinel2_l2a_mo10
          - sentinel2_l2a_mo11
          - sentinel2_l2a_mo12
        load_all_layers: true
        bands:
          - B02
          - B03
          - B04
          - B08
          - B05
          - B06
          - B07
          - B8A
          - B11
          - B12
          - B01
          - B09
        passthrough: true
      sentinel1:
        data_type: raster
        dtype: FLOAT32
        layers:
          - sentinel1_mo01
          - sentinel1_mo02
          - sentinel1_mo03
          - sentinel1_mo04
          - sentinel1_mo05
          - sentinel1_mo06
          - sentinel1_mo07
          - sentinel1_mo08
          - sentinel1_mo09
          - sentinel1_mo10
          - sentinel1_mo11
          - sentinel1_mo12
        load_all_layers: true
        bands:
          - vv
          - vh
        passthrough: true
      # Precomputed embedding products converted from the processed PASTIS
      # .pt splits (see pastis_rslearn_export.py); consumed exactly as stored.
      gse:
        data_type: raster
        dtype: FLOAT32
        layers:
          - gse
        use_all_bands_in_order_of_band_set_idx: 0
        passthrough: true
      tessera:
        data_type: raster
        dtype: FLOAT32
        layers:
          - tessera
        use_all_bands_in_order_of_band_set_idx: 0
        passthrough: true
      targets:
        data_type: raster
        dtype: INT32
        layers:
          - label
        bands:
          - label
        is_target: true
    task:
      class_path: rslearn.train.tasks.segmentation.SegmentationTask
      init_args:
        # PASTIS: background (0) + 18 crop classes; 19 is the void label and
        # is masked to invalid (mapped to the segmentation ignore label by the
        # eval-time wrapper).
        num_classes: 19
        nodata_value: 19
        enable_miou_metric: true
    batch_size: 8
    num_workers: 4
