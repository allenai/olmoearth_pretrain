# Data-only config for landslide pos/neg detection via ERA5-daily inputs.
# Adapted for the olmoearth_pretrain ERA5 supervised (objective A) / downstream
# linear-probe path. Only the `data:` section is consumed by the eval builder
# (olmoearth_pretrain.evals.datasets.rslearn_builder); the rslearn `model:` /
# `trainer:` sections are intentionally omitted.
#
# Task: window-level binary classification. Each window carries a single-feature
# vector `label` layer (category = positive|negative), read by an rslearn
# ClassificationTask. "positive" is class id 1 (so F1-on-positive matches the
# other ERA5 evals). Splits are tag-based on `options.split` (train/val), written
# by the tagging step (evals/datasets/splits/landslide_era5/eval_tagging.py).
#
# The ERA5 layer `era5d_448d_to_event` is stored 1x1 at 640 m per the window's
# 640 m extent (64 px @ 10 m), so it is read at native 1x1 with
# resolution_factor 1/64 (window_res 10 m / raster_res 640 m).
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/olmoearth/eval_datasets/landslide_era5
    inputs:
      era5_daily:
        data_type: raster
        layers:
        - era5d_448d_to_event
        use_all_bands_in_order_of_band_set_idx: 0
        passthrough: true
        dtype: FLOAT32
        resolution_factor: "1/64"
      targets:
        data_type: vector
        layers:
        - label
        is_target: true
    task:
      class_path: rslearn.train.tasks.classification.ClassificationTask
      init_args:
        property_name: category
        classes:
        - negative
        - positive
        enable_f1_metric: true
        metric_kwargs:
          average: micro
    batch_size: 64
    num_workers: 16
    default_config:
      transforms:
      - class_path: rslearn.train.transforms.normalize.Normalize
        init_args:
          mean: &id001
          - 276.61895076286095
          - -0.0015263211536627938
          - -0.007465690873178205
          - 0.0010928385192369757
          - 91837.17168565071
          - 12801279.551678993
          - 16488831.241778402
          - -5972070.409531386
          - 0.26880851459988053
          - 0.28140566039375736
          - 284.76292324490106
          - 0.002621525757494073
          - 0.026601745887797196
          - 0.012848609156993282
          std: &id002
          - 14.39720515289558
          - 0.0014636643464034686
          - 0.00727726121728425
          - 0.003756281299664474
          - 9517.223545887384
          - 6987935.884812039
          - 8203590.214258837
          - 3225719.470627974
          - 0.14553213291530795
          - 0.12816708232587504
          - 15.554434731901289
          - 0.006538003324970979
          - 1.9911724259455854
          - 1.8940515269743978
          selectors:
          - era5_daily
    train_config:
      groups:
      - sen12_landslides
      - glc
      tags:
        split: train
      transforms:
      - class_path: rslearn.train.transforms.normalize.Normalize
        init_args:
          mean: *id001
          std: *id002
          selectors:
          - era5_daily
    val_config:
      groups:
      - sen12_landslides
      - glc
      tags:
        split: val
    test_config:
      groups:
      - sen12_landslides
      - glc
      tags:
        split: val
    predict_config:
      skip_targets: true
