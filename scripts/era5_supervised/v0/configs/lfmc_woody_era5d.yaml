# Data-only config for LFMC woody regression via ERA5-daily inputs.
# Adapted from the sentinel2 fine-tuning config for the olmoearth_pretrain
# ERA5 supervised (objective A) direct-load path.  Only the `data:` section
# is consumed; the rslearn model/trainer sections are omitted.
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/rslearn-eai/datasets/lfmc/20251023/woody/scratch/dataset
    inputs:
      era5_daily:
        data_type: raster
        layers:
        - era5d_448d_historical
        use_all_bands_in_order_of_band_set_idx: 0
        passthrough: true
        dtype: FLOAT32
        resolution_factor: "1/63"
      targets:
        data_type: raster
        layers:
        - labels
        bands:
        - value
        dtype: FLOAT32
        is_target: true
    task:
      class_path: rslearn.train.tasks.per_pixel_regression.PerPixelRegressionTask
      init_args:
        nodata_value: -1
        metrics:
        - rmse
        - r2
    batch_size: 64
    num_workers: 16
    default_config:
      transforms:
      - class_path: rslearn.train.transforms.normalize.Normalize
        init_args:
          mean:
          - 276.61895076286095
          - -0.0015263211536627938
          - -0.007465690873178205
          - 0.0010928385192369757
          - 91837.17168565071
          - 12801279.551678993
          - 16488831.241778402
          - -5972070.409531386
          - 0.26880851459988053
          - 0.28140566039375736
          - 284.76292324490106
          - 0.002621525757494073
          - 0.026601745887797196
          - 0.012848609156993282
          std:
          - 14.39720515289558
          - 0.0014636643464034686
          - 0.00727726121728425
          - 0.003756281299664474
          - 9517.223545887384
          - 6987935.884812039
          - 8203590.214258837
          - 3225719.470627974
          - 0.14553213291530795
          - 0.12816708232587504
          - 15.554434731901289
          - 0.006538003324970979
          - 1.9911724259455854
          - 1.8940515269743978
          selectors:
          - era5_daily
    train_config:
      groups:
      - spatial_split
      tags:
        split: train
    val_config:
      groups:
      - spatial_split
      tags:
        split: val
    test_config:
      groups:
      - spatial_split
      tags:
        split: test
    predict_config:
      skip_targets: true
