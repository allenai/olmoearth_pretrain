# Data-only config for LFMC woody regression via ERA5-daily inputs.
# Adapted from the sentinel2 fine-tuning config for the olmoearth_pretrain
# ERA5 supervised (objective A) direct-load path.  Only the `data:` section
# is consumed; the rslearn model/trainer sections are omitted.
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/rslearn-eai/datasets/lfmc/20251023/woody/scratch/dataset
    inputs:
      era5_daily:
        data_type: raster
        layers:
        - era5_365dhistory
        use_all_bands_in_order_of_band_set_idx: 0
        passthrough: true
        dtype: FLOAT32
        resolution_factor: "1/280"
      targets:
        data_type: raster
        layers:
        - labels
        bands:
        - value
        dtype: FLOAT32
        is_target: true
    task:
      class_path: rslearn.train.tasks.per_pixel_regression.PerPixelRegressionTask
      init_args:
        nodata_value: -1
        metrics:
        - rmse
        - r2
        target_mean: 108.389520
        target_std: 36.616698
    batch_size: 64
    num_workers: 16
    default_config:
      transforms:
      - class_path: rslearn.train.transforms.normalize.Normalize
        init_args:
          mean:
          - 268.209
          - -0.00113
          - -0.00833
          - 0.000897
          - 94745.2
          - 9079014.2
          - 11716921.0
          - -4499458.3
          - 0.343
          - 0.339
          - -0.0584
          - 0.00188
          - 0.463
          - 0.0691
          std:
          - 14.149
          - 0.00125
          - 0.00966
          - 0.00221
          - 5192.3
          - 7486798.9
          - 8479277.6
          - 2228211.3
          - 0.1436
          - 0.1426
          - 13.825
          - 0.00425
          - 1.787
          - 1.697
          selectors:
          - era5_daily
    train_config:
      groups:
      - spatial_split
      tags:
        split: train
    val_config:
      groups:
      - spatial_split
      tags:
        split: val
    test_config:
      groups:
      - spatial_split
      tags:
        split: test
    predict_config:
      skip_targets: true
