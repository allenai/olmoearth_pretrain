# Data-only config for LFMC woody regression via ERA5-daily inputs.
# Adapted from the sentinel2 fine-tuning config for the olmoearth_pretrain
# ERA5 supervised (objective A) direct-load path.  Only the `data:` section
# is consumed; the rslearn model/trainer sections are omitted.
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/rslearn-eai/datasets/lfmc/20251023/woody/scratch/dataset
    inputs:
      era5_daily:
        data_type: raster
        layers:
        - era5d_448d_historical
        use_all_bands_in_order_of_band_set_idx: 0
        passthrough: true
        dtype: FLOAT32
        resolution_factor: "1/63"
      targets:
        data_type: raster
        layers:
        - labels
        bands:
        - value
        dtype: FLOAT32
        is_target: true
    task:
      class_path: rslearn.train.tasks.per_pixel_regression.PerPixelRegressionTask
      init_args:
        nodata_value: -1
        metrics:
        - rmse
        - r2
    batch_size: 64
    num_workers: 16
    # ERA5 normalization is handled by the OlmoEarth Normalizer
    # (Strategy.ZSCORE, computed.json); the rslearn Normalize transform is
    # intentionally omitted (the eval builder strips it at load anyway).
    train_config:
      groups:
      - spatial_split
      tags:
        split: train
    val_config:
      groups:
      - spatial_split
      tags:
        split: val
    test_config:
      groups:
      - spatial_split
      tags:
        split: test
    predict_config:
      skip_targets: true
