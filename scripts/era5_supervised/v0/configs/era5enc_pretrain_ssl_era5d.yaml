# Data-only config for the ERA5-daily self-supervised (SSL) data source.
#
# This is the label-free pretraining corpus for the ERA5 daily encoder
# (objective B / reconstruction, and any future SSL objective). It points at
# the `era5enc_pretrain` rslearn dataset on Weka, whose only materialized layer
# is `era5d_448d_historical` (14 ERA5-Land daily bands x 448 daily timesteps,
# stored 1x1 / non-spatial per window).
#
# Only the `data:` section is consumed by the eval builder
# (olmoearth_pretrain.evals.datasets.rslearn_builder); the rslearn `model:` /
# `trainer:` sections are intentionally omitted.
#
# SSL specifics:
#   * No supervised target layer exists in this dataset, so we set
#     `skip_targets: true`. With load_targets=False, the rslearn task's
#     process_inputs is a no-op (returns empty dicts), and the ERA5 tensor is
#     surfaced purely via the `passthrough: true` input. The `task:` block below
#     is therefore a never-exercised placeholder required only because
#     RslearnDataModule mandates a Task.
#   * The ERA5 layer is stored 1x1 at 1280 m (the window is 128 px @ 10 m =
#     1280 m), so it is read at native 1x1 with resolution_factor 1/128
#     (window_res 10 m / raster_res 1280 m). Cf. landslide_era5 which uses 1/64
#     for its 64 px @ 10 m windows.
#   * Bands are pulled in band-set order (idx 0) so they match
#     Modality.ERA5L_DAY_10.band_order exactly (14 bands).
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    path: /weka/dfive-default/helios/dataset/era5enc_pretrain/rslearn_dataset
    inputs:
      era5_daily:
        data_type: raster
        layers:
        - era5d_448d_historical
        use_all_bands_in_order_of_band_set_idx: 0
        passthrough: true
        dtype: FLOAT32
        resolution_factor: "1/128"
    # Placeholder task: never reads targets (skip_targets=true below), present
    # only to satisfy RslearnDataModule's required `task` argument.
    task:
      class_path: rslearn.train.tasks.classification.ClassificationTask
      init_args:
        property_name: label
        classes:
        - negative
        - positive
    batch_size: 32
    num_workers: 16
    default_config:
      skip_targets: true
      # ERA5 normalization is handled by the OlmoEarth Normalizer
      # (Strategy.ZSCORE, computed.json); the rslearn Normalize transform is
      # intentionally omitted (the eval builder strips it at load anyway).
    train_config:
      groups:
      - default
      skip_targets: true
